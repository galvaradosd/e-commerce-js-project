<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopFast | Catalog, cart and checkout</title>
    <meta
      name="description"
      content="Product catalog with fast navigation, cart and checkout. Content optimized for search engines and AI assistants."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="googlebot" content="index,follow,max-image-preview:large" />
    <meta name="author" content="ShopFast" />
    <meta name="application-name" content="ShopFast" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:title" content="ShopFast | Catalog and Checkout" />
    <meta
      property="og:description"
      content="Explore products, add to cart and complete your purchase with a fast and accessible experience."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopFast" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ShopFast | Catalog and Checkout" />
    <meta
      name="twitter:description"
      content="Modern catalog with cart and checkout optimized for users and search engines."
    />

    <link rel="dns-prefetch" href="https://picsum.photos" />
    <link rel="preconnect" href="https://picsum.photos" crossorigin />
    <link rel="stylesheet" href="css/styles.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "ShopFast",
            "description": "Product catalog with cart and checkout optimized for search engines and AI assistants.",
              "inLanguage": "en"
          },
          {
            "@type": "Organization",
            "name": "ShopFast",
            "description": "Digital commerce with a fast and accessible shopping experience."
          }
        ]
      }
    </script>
  </head>
  <body class="page">
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="page__header">
      <nav class="nav" aria-label="Main">
        <a class="nav__brand" href="#/">ShopFast</a>

        <div class="nav__links" role="list">
          <a class="nav__link" data-route="home" data-i18n="navAll" href="#/">All</a>
          <a class="nav__link" data-route="category" data-i18n="navTech" href="#/category/tecnologia">
            Technology
          </a>
          <a class="nav__link" data-route="category" data-i18n="navClothing" href="#/category/ropa">
            Clothing
          </a>
          <a class="nav__link" data-route="category" data-i18n="navHome" href="#/category/hogar">
            Home
          </a>
          <a class="nav__link" data-route="admin" data-i18n="navAdmin" href="#/admin">Admin</a>
        </div>

        <div class="theme-control">
          <label class="theme-control__label" data-i18n="themeLabel" for="theme-select">Theme</label>
          <select
            class="theme-control__select"
            id="theme-select"
            name="theme"
            data-theme-select
          >
            <option value="system" data-i18n="themeSystem">System</option>
            <option value="light" data-i18n="themeLight">Light</option>
            <option value="dark" data-i18n="themeDark">Dark</option>
          </select>
        </div>

        <div class="lang-control">
          <label class="lang-control__label" data-i18n="languageLabel" for="lang-select">Language</label>
          <select
            class="lang-control__select"
            id="lang-select"
            name="language"
            data-language-select
          >
            <option value="en" data-i18n="languageEnglish">English</option>
            <option value="es" data-i18n="languageSpanish">Español</option>
          </select>
        </div>

        <a class="cart-widget" href="#/cart" aria-label="Go to cart">
          <span class="cart-widget__icon" aria-hidden="true">🛒</span>
          <span class="cart-widget__count" data-cart-count>0</span>
        </a>
      </nav>
    </header>

    <main class="page__main" id="main-content">
      <section
        id="app"
        class="app"
        role="region"
        aria-live="polite"
        aria-atomic="true"
      >
        <section class="section">
          <h1 class="section-title">Loading catalog…</h1>
            <p class="section-subtitle">Preparing available products.</p>
        </section>
      </section>
    </main>

    <footer class="page__footer">
      <small class="page__footer-text">© 2025 ShopFast · coded by <a href="https://github.com/galvaradosd" target="_blank" rel="noopener noreferrer">Germán Alvarado</a></small>
    </footer>

    <script src="js/data.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
  </body>
</html>
